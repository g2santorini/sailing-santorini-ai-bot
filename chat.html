<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santorini Chatbot Widget</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
    }

    #chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 50%;
      background: #0f62fe;
      color: white;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    #chat-widget {
      position: fixed;
      bottom: 95px;
      right: 20px;
      width: 360px;
      height: 520px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      background: #0f62fe;
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }

    #chat-messages {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      background: #f7f7f9;
    }

    .message {
      margin-bottom: 12px;
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      background: #0f62fe;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: #e9ecef;
      color: #111;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    #chat-input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      background: white;
      gap: 8px;
    }

    #message {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    #send-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #0f62fe;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    #send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 18px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7a7a7a;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.7);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <button id="chat-toggle" onclick="toggleChat()">💬</button>

  <div id="chat-widget">
    <div id="chat-header">Chat with us</div>
    <div id="chat-messages">
      <div class="message bot">Hello! How can I help you today?</div>
    </div>
    <div id="chat-input-area">
      <input id="message" type="text" placeholder="Type your message..." />
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function toggleChat() {
      const widget = document.getElementById("chat-widget");
      widget.style.display = widget.style.display === "flex" ? "none" : "flex";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function addUserMessage(text) {
      const messages = document.getElementById("chat-messages");
      messages.innerHTML += `<div class="message user">${escapeHtml(text)}</div>`;
      messages.scrollTop = messages.scrollHeight;
    }

    function addBotMessage(htmlText) {
      const messages = document.getElementById("chat-messages");
      messages.innerHTML += `<div class="message bot">${htmlText}</div>`;
      messages.scrollTop = messages.scrollHeight;
    }

    function addTypingIndicator() {
      const messages = document.getElementById("chat-messages");

      const typingWrapper = document.createElement("div");
      typingWrapper.className = "message bot";
      typingWrapper.id = "typing-indicator";

      typingWrapper.innerHTML = `
        <div class="typing">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;

      messages.appendChild(typingWrapper);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTypingIndicator() {
      const typing = document.getElementById("typing-indicator");
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const input = document.getElementById("message");
      const sendBtn = document.getElementById("send-btn");
      const userMessage = input.value.trim();

      if (!userMessage) return;

      addUserMessage(userMessage);
      input.value = "";
      input.disabled = true;
      sendBtn.disabled = true;

      addTypingIndicator();

      try {
        const response = await fetch("http://127.0.0.1:8000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: userMessage
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const data = await response.json();

        removeTypingIndicator();
        addBotMessage(escapeHtml(data.reply).replace(/\n/g, "<br>"));
      } catch (error) {
        console.error("Fetch error:", error);
        removeTypingIndicator();
        addBotMessage("Sorry, I could not reach the server.");
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    document.getElementById("message").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
