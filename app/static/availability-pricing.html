<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Availability & Pricing</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --header-bg: #f9fafb;
      --primary: #0b3b66;
      --primary-hover: #145c94;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --warn-bg: #fef3c7;
      --warn-text: #92400e;
      --danger-bg: #fee2e2;
      --danger-text: #991b1b;
      --info-bg: #e0e7ff;
      --info-text: #3730a3;
      --unknown-bg: #e5e7eb;
      --unknown-text: #374151;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 980px;
      margin: 32px auto;
      padding: 16px;
    }

    .card {
      position: relative;
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 24px;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(
          circle at 85% 20%,
          rgba(224, 233, 245, 0.5) 0%,
          rgba(224, 233, 245, 0.2) 20%,
          transparent 45%
        ),
        linear-gradient(
          135deg,
          #ffffff 0%,
          #ffffff 55%,
          #f3f7fc 80%,
          #edf2f8 100%
        );
    }

    .card > * {
      position: relative;
      z-index: 0;
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 8px;
    }

    .top-row-left {
      flex: 1 1 auto;
      min-width: 0;
    }

    .top-row-right {
      display: none;
    }

    .controls-logo-wrap {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin: 0 0 30px;
      width: 100%;
    }

    .logo {
      height: 100px;
      max-width: 220px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 18px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0;
      flex: 1 1 auto;
      min-width: 0;
    }

    .controls input[type="date"] {
      min-width: 190px;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
    }

    .controls button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s ease;
    }

    .controls button:hover {
      background: var(--primary-hover);
    }

    .controls button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .loader-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
    }

    .loader {
      width: 24px;
      height: 24px;
      border: 3px solid #e5e7eb;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    .loader-text {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .message {
      margin-bottom: 16px;
      font-size: 14px;
      color: #374151;
      line-height: 1.5;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: transparent;
    }

    th,
    td {
      text-align: left;
      padding: 16px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
      vertical-align: middle;
    }

    th {
      background: rgba(249, 250, 251, 0.75);
      color: #374151;
      font-weight: 700;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      line-height: 1;
      min-height: 36px;
    }

    .status-available {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .status-low {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .status-contact {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .status-unknown {
      background: var(--unknown-bg);
      color: var(--unknown-text);
    }

    .status-missing {
      background: var(--info-bg);
      color: var(--info-text);
    }

    .muted {
      color: var(--muted);
    }

    .desktop-tour-name {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .tour-name-text {
      font-weight: 700;
      line-height: 1.35;
    }

    .expand-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border: 1px solid rgba(11, 59, 102, 0.16);
      border-radius: 999px;
      background: rgba(11, 59, 102, 0.06);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      text-align: left;
    }

    .expand-btn:hover {
      background: rgba(11, 59, 102, 0.12);
      border-color: rgba(11, 59, 102, 0.28);
      color: var(--primary-hover);
    }

    .details-row {
      display: none;
    }

    .details-row.open {
      display: table-row;
    }

    .details-cell {
      padding-top: 0;
      padding-bottom: 16px;
      background: rgba(255, 255, 255, 0.45);
    }

    .details-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(249, 250, 251, 0.9);
      color: var(--text);
      line-height: 1.5;
      font-size: 14px;
    }

    .mobile-list {
      display: none;
    }

    .mobile-tour-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      background: rgba(255, 255, 255, 0.82);
    }

    .mobile-tour-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .mobile-tour-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f2f5;
      font-size: 14px;
      align-items: center;
    }

    .mobile-tour-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .mobile-label {
      color: var(--muted);
      font-weight: 600;
      min-width: 110px;
      flex: 0 0 110px;
    }

    .mobile-value {
      text-align: right;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .mobile-value.text-wrap {
      white-space: normal;
      word-break: break-word;
      line-height: 1.2;
    }

    .mobile-status-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 0;
      border-bottom: none;
    }

    .mobile-status-row .mobile-label {
      min-width: 0;
      flex: none;
    }

    .mobile-status-row .mobile-value {
      justify-content: flex-start;
      text-align: left;
      width: 100%;
      align-items: flex-start;
    }

    .mobile-value .status-badge {
      font-size: 12px;
      padding: 6px 10px;
      min-height: 32px;
    }

    .mobile-expand-wrap {
      margin-top: 12px;
    }

    .mobile-details {
      display: none;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: rgba(249, 250, 251, 0.9);
      color: var(--text);
      line-height: 1.5;
      font-size: 14px;
    }

    .mobile-details.open {
      display: block;
    }

    @media (max-width: 768px) {
      .page {
        margin: 18px auto;
        padding: 12px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
      }

      .card::before {
        background:
          radial-gradient(
            circle at 78% 30%,
            rgba(224, 233, 245, 0.38) 0%,
            rgba(224, 233, 245, 0.16) 18%,
            transparent 38%
          ),
          linear-gradient(
            135deg,
            #ffffff 0%,
            #ffffff 62%,
            #f5f8fc 84%,
            #eef3f8 100%
          );
      }

      .logo {
        height: 78px;
        max-width: 200px;
      }

      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 14px;
        margin-bottom: 20px;
      }

      .controls-row {
        gap: 18px;
      }

      table {
        min-width: 580px;
      }
    }

    @media (max-width: 640px) {
      .top-row {
        flex-direction: column;
        align-items: stretch;
        margin-bottom: 0;
      }

      .controls-logo-wrap {
        justify-content: flex-start;
        margin-bottom: 28px;
      }

      .controls-row {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .controls input[type="date"],
      .controls button {
        width: 100%;
      }

      .controls input[type="date"] {
        min-width: 0;
      }

      .logo {
        height: 82px;
        max-width: 220px;
      }

      .loader-wrap {
        justify-content: center;
      }

      .table-wrap {
        display: none;
      }

      .mobile-list {
        display: block;
      }

      h1 {
        font-size: 22px;
      }

      .card {
        padding: 16px;
      }

      .card::before {
        background:
          linear-gradient(
            135deg,
            #ffffff 0%,
            #ffffff 70%,
            #f5f8fc 100%
          );
      }

      .message {
        font-size: 13px;
      }

      .mobile-tour-title {
        font-size: 16px;
      }

      .mobile-label {
        flex: 0 0 100px;
        min-width: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="top-row">
        <div class="top-row-left">
          <div class="controls-logo-wrap">
            <img src="/static/logo.png" alt="Sailing Santorini" class="logo">
          </div>

          <h1>Availability & Pricing</h1>
          <p class="subtitle">Check live availability and pricing for your selected date.</p>
        </div>
      </div>

      <div class="controls-row">
        <div class="controls">
          <input type="date" id="dateInput" />
          <button id="loadBtn">Check availability</button>
        </div>
      </div>

      <div id="loaderWrap" class="loader-wrap">
        <div class="loader"></div>
        <div class="loader-text">Loading availability...</div>
      </div>

      <div id="message" class="message">Please select a date.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cruise</th>
              <th>Price</th>
              <th>Available Spots</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="4" class="muted">No data loaded yet.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="mobileList" class="mobile-list">
        <div class="muted">No data loaded yet.</div>
      </div>
    </div>
  </div>

  <script>
    const dateInput = document.getElementById("dateInput");
    const loadBtn = document.getElementById("loadBtn");
    const loaderWrap = document.getElementById("loaderWrap");
    const message = document.getElementById("message");
    const resultsBody = document.getElementById("resultsBody");
    const mobileList = document.getElementById("mobileList");

    function formatPrice(price) {
      if (price === null || price === undefined) {
        return "—";
      }
      return `€${Number(price).toFixed(0)}`;
    }

    function formatSpots(spots) {
      if (spots === null || spots === undefined) {
        return "—";
      }
      if (spots > 20) {
        return "20+";
      }
      if (spots <= 0) {
        return "Please contact us";
      }
      return String(spots);
    }

    function formatDetails(details) {
      if (!details) {
        return "—";
      }

      return details
        .split("\n")
        .map(line => {
          const urlMatch = line.match(/https?:\/\/\S+/);

          if (urlMatch) {
            const url = urlMatch[0];

            return line.replace(
              url,
              `<a href="${url}" target="_blank" style="color:#0b3b66; font-weight:600; text-decoration: underline;">
                More Information
              </a>`
            );
          }

          return line;
        })
        .join("<br>");
    }

    function getStatusLabel(status, spots) {
      if (status === "available") {
        if (typeof spots === "number" && spots <= 10) {
          return "Low availability";
        }
        return "Available";
      }

      if (status === "low") {
        return "Low availability";
      }

      if (status === "contact_us") {
        return "Please contact us";
      }

      if (status === "missing_ids") {
        return "Not connected yet";
      }

      if (status === "error") {
        return "Error";
      }

      return "Unknown";
    }

    function getStatusClass(status, spots) {
      if (status === "available") {
        if (typeof spots === "number" && spots <= 10) {
          return "status-low";
        }
        return "status-available";
      }
      if (status === "low") {
        return "status-low";
      }
      if (status === "contact_us" || status === "error") {
        return "status-contact";
      }
      if (status === "missing_ids") {
        return "status-missing";
      }
      return "status-unknown";
    }

    function renderDesktopRows(tours) {
      if (!Array.isArray(tours) || tours.length === 0) {
        resultsBody.innerHTML = `
          <tr>
            <td colspan="4" class="muted">No results found.</td>
          </tr>
        `;
        return;
      }

      resultsBody.innerHTML = tours.map((tour, index) => {
        const statusLabel = getStatusLabel(tour.status, tour.available_spots);
        const statusClass = getStatusClass(tour.status, tour.available_spots);
        const detailsId = `desktop-details-${index}`;

        return `
          <tr>
            <td>
              <div class="desktop-tour-name">
                <span class="tour-name-text">${tour.name ?? "—"}</span>
                <button class="expand-btn" type="button" onclick="toggleDesktopDetails('${detailsId}', this)">
                  Tour Info
                </button>
              </div>
            </td>
            <td>${formatPrice(tour.price)}</td>
            <td>${formatSpots(tour.available_spots)}</td>
            <td>
              <span class="status-badge ${statusClass}">
                ${statusLabel}
              </span>
            </td>
          </tr>
          <tr id="${detailsId}" class="details-row">
            <td colspan="4" class="details-cell">
              <div class="details-box">${formatDetails(tour.details)}</div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function renderMobileRows(tours) {
      if (!Array.isArray(tours) || tours.length === 0) {
        mobileList.innerHTML = `<div class="muted">No results found.</div>`;
        return;
      }

      mobileList.innerHTML = tours.map((tour, index) => {
        const statusLabel = getStatusLabel(tour.status, tour.available_spots);
        const statusClass = getStatusClass(tour.status, tour.available_spots);
        const spotsValue = formatSpots(tour.available_spots);
        const spotsClass = spotsValue.length > 12 ? "mobile-value text-wrap" : "mobile-value";
        const detailsId = `mobile-details-${index}`;

        return `
          <div class="mobile-tour-card">
            <div class="mobile-tour-title">${tour.name ?? "—"}</div>

            <div class="mobile-tour-row">
              <div class="mobile-label">Price</div>
              <div class="mobile-value">${formatPrice(tour.price)}</div>
            </div>

            <div class="mobile-tour-row">
              <div class="mobile-label">Available Spots</div>
              <div class="${spotsClass}">${spotsValue}</div>
            </div>

            <div class="mobile-tour-row mobile-status-row">
              <div class="mobile-label">Status</div>
              <div class="mobile-value">
                <span class="status-badge ${statusClass}">
                  ${statusLabel}
                </span>
              </div>
            </div>

            <div class="mobile-expand-wrap">
              <button class="expand-btn" type="button" onclick="toggleMobileDetails('${detailsId}', this)">
                Tour Info
              </button>
              <div id="${detailsId}" class="mobile-details">${formatDetails(tour.details)}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderRows(tours) {
      renderDesktopRows(tours);
      renderMobileRows(tours);
    }

    function toggleDesktopDetails(detailsId, button) {
      const row = document.getElementById(detailsId);
      if (!row) return;

      const isOpen = row.classList.contains("open");
      row.classList.toggle("open");
      button.textContent = isOpen ? "Tour Info" : "Hide Info";
    }

    function toggleMobileDetails(detailsId, button) {
      const box = document.getElementById(detailsId);
      if (!box) return;

      const isOpen = box.classList.contains("open");
      box.classList.toggle("open");
      button.textContent = isOpen ? "Tour Info" : "Hide Info";
    }

    async function loadAvailability() {
      const selectedDate = dateInput.value;

      if (!selectedDate) {
        message.textContent = "Please select a date first.";
        return;
      }

      message.textContent = "Loading...";
      loaderWrap.style.display = "flex";
      loadBtn.disabled = true;

      resultsBody.innerHTML = `
        <tr>
          <td colspan="4" class="muted">Loading data...</td>
        </tr>
      `;

      mobileList.innerHTML = `<div class="muted">Loading data...</div>`;

      try {
        const response = await fetch(`/availability-page-data?date=${selectedDate}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Failed to load availability.");
        }

        message.textContent = `Showing results for ${data.date}`;
        renderRows(data.tours);
      } catch (error) {
        message.textContent = `Error: ${error.message}`;
        resultsBody.innerHTML = `
          <tr>
            <td colspan="4" class="muted">Could not load data.</td>
          </tr>
        `;
        mobileList.innerHTML = `<div class="muted">Could not load data.</div>`;
      } finally {
        loaderWrap.style.display = "none";
        loadBtn.disabled = false;
      }
    }

    loadBtn.addEventListener("click", loadAvailability);

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    dateInput.value = `${yyyy}-${mm}-${dd}`;
  </script>
</body>
</html>
