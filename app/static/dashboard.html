<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunset Oia Chat Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f7fb;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 24px;
    }

    .top-bar {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .filter-group input {
      padding: 9px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }

    .refresh-btn {
      background: #0b3b66;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      height: 40px;
    }

    .refresh-btn:hover {
      opacity: 0.92;
    }

    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.45;
    }

    th {
      background: #0b3b66;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover {
      background: #f9fafb;
    }

    .fallback-yes {
      color: #b91c1c;
      font-weight: bold;
    }

    .fallback-no {
      color: #15803d;
      font-weight: bold;
    }

    .conversation-cell {
      min-width: 560px;
    }

    .conversation-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 720px;
    }

    .pair-block {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 10px;
      background: #ffffff;
    }

    .message-block {
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.5;
    }

    .message-block + .message-block {
      margin-top: 8px;
    }

    .user-line {
      background: #fef2f2;
      border-left: 4px solid #dc2626;
      color: #b91c1c;
      font-weight: 700;
    }

    .bot-line {
      background: #eff6ff;
      border-left: 4px solid #2563eb;
      color: #1d4ed8;
      font-weight: 600;
    }

    .message-title {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      opacity: 0.9;
    }

    .message-text {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .small-muted {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }

    .compact-cell {
      min-width: 100px;
      max-width: 130px;
      white-space: normal;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.35;
    }

    .tour-cell {
      min-width: 120px;
      max-width: 160px;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.35;
    }

    .session-cell {
      min-width: 120px;
      max-width: 150px;
      font-family: Consolas, monospace;
      font-size: 11px;
      color: #374151;
      word-break: break-word;
      line-height: 1.3;
    }

    .lang-cell {
      min-width: 70px;
      white-space: nowrap;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 20px;
      }

      th, td {
        padding: 10px;
        font-size: 13px;
      }

      .conversation-cell {
        min-width: 420px;
      }

      .conversation-box {
        max-width: 520px;
      }

      .refresh-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>Sunset Oia Chat Dashboard</h1>

  <div class="top-bar">
    <div class="filter-group">
      <label for="from-date">From date</label>
      <input type="date" id="from-date" />
    </div>

    <div class="filter-group">
      <label for="to-date">To date</label>
      <input type="date" id="to-date" />
    </div>

    <button class="refresh-btn" onclick="loadSessions()">Apply Filters</button>
    <button id="fallback-btn" class="refresh-btn" onclick="toggleFallback()">Show Only Fallback Sessions</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Conversation</th>
          <th>Start time</th>
          <th>Last activity</th>
          <th>Messages count</th>
          <th>Fallbacks</th>
          <th>Tours</th>
          <th>Session ID</th>
          <th>Language</th>
        </tr>
      </thead>
      <tbody id="sessions-body">
        <tr>
          <td colspan="8">Loading sessions...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    let showOnlyFallback = false;

    function toggleFallback() {
      showOnlyFallback = !showOnlyFallback;

      const btn = document.getElementById("fallback-btn");
      btn.innerText = showOnlyFallback
        ? "Show All Sessions"
        : "Show Only Fallback Sessions";

      loadSessions();
    }

    async function loadSessions() {
      const tbody = document.getElementById("sessions-body");
      tbody.innerHTML = `<tr><td colspan="8">Loading sessions...</td></tr>`;

      try {
        const fromDate = document.getElementById("from-date").value;
        const toDate = document.getElementById("to-date").value;

        const params = new URLSearchParams();

        if (fromDate) params.append("from_date", fromDate);
        if (toDate) params.append("to_date", toDate);

        const response = await fetch(`/admin/sessions?${params.toString()}`);
        const data = await response.json();
        const sessions = data.sessions || [];

        let filteredSessions = sessions;

        if (showOnlyFallback) {
          filteredSessions = sessions.filter(
            session => Number(session.fallback_count || 0) > 0
          );
        }

        if (!filteredSessions.length) {
          tbody.innerHTML = `<tr><td colspan="8">${
            showOnlyFallback
              ? "No fallback sessions found."
              : "No sessions found."
          }</td></tr>`;
          return;
        }

        tbody.innerHTML = filteredSessions.map(session => {
          const conversationHtml = buildConversation(session.conversation || []);
          const tours = Array.isArray(session.detected_tours) && session.detected_tours.length
            ? session.detected_tours.map(t => escapeHtml(t)).join(", ")
            : "-";

          return `
            <tr>
              <td class="conversation-cell">
                <div class="conversation-box">
                  ${conversationHtml}
                </div>
              </td>
              <td class="compact-cell">${formatGreekDateTime(session.start_time ?? "")}</td>
              <td class="compact-cell">${formatGreekDateTime(session.last_activity ?? "")}</td>
              <td class="compact-cell">${escapeHtml(session.messages_count ?? 0)}</td>
              <td class="compact-cell ${Number(session.fallback_count || 0) > 0 ? 'fallback-yes' : 'fallback-no'}">
                ${escapeHtml(session.fallback_count ?? 0)}
              </td>
              <td class="tour-cell">${tours}</td>
              <td class="session-cell">${escapeHtml(session.session_id ?? "-")}</td>
              <td class="lang-cell">${escapeHtml(session.language ?? "-")}</td>
            </tr>
          `;
        }).join("");
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="8">Failed to load sessions.</td></tr>`;
        console.error(error);
      }
    }

    function buildConversation(conversation) {
      if (!Array.isArray(conversation) || !conversation.length) {
        return `<div class="small-muted">No conversation available.</div>`;
      }

      return conversation.map(item => `
        <div class="pair-block">
          <div class="message-block user-line">
            <span class="message-title">Customer</span>
            <span class="message-text">${escapeHtml(item.user_message ?? "")}</span>
          </div>
          <div class="message-block bot-line">
            <span class="message-title">Bot</span>
            <span class="message-text">${escapeHtml(item.bot_reply ?? "")}</span>
          </div>
          <div class="small-muted">
            ${formatGreekDateTime(item.timestamp ?? "")}
            ${Number(item.fallback) === 1 || item.fallback === true ? " · Fallback" : ""}
          </div>
        </div>
      `).join("");
    }

    function formatGreekDateTime(isoString) {
      if (!isoString) return "-";

      const [datePart, timePartRaw] = String(isoString).split("T");
      if (!datePart || !timePartRaw) return escapeHtml(isoString);

      const [year, month, day] = datePart.split("-");
      const timePart = timePartRaw.slice(0, 5);

      if (!year || !month || !day) return escapeHtml(isoString);

      return `${day}-${month}-${year} ${timePart}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadSessions();
  </script>
</body>
</html>
