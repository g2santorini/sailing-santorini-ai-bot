<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunset Oia Chat Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 20px;
    }

    .top-bar {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .refresh-btn {
      background: #0b3b66;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .refresh-btn:hover {
      opacity: 0.92;
    }

    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1250px;
    }

    th, td {
      text-align: left;
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.45;
    }

    th {
      background: #0b3b66;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover {
      background: #f9fafb;
    }

    .fallback-yes {
      color: #b91c1c;
      font-weight: bold;
    }

    .fallback-no {
      color: #15803d;
      font-weight: bold;
    }

    .timestamp-cell {
      white-space: nowrap;
      min-width: 180px;
    }

    .session-cell {
      min-width: 180px;
      max-width: 220px;
      font-family: Consolas, monospace;
      font-size: 12px;
      color: #374151;
      word-break: break-word;
    }

    .conversation-cell {
      min-width: 460px;
    }

    .conversation-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 700px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-block {
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.55;
    }

    .user-line {
      background: #fef2f2;
      border-left: 4px solid #dc2626;
      color: #b91c1c;
      font-weight: 700;
    }

    .bot-line {
      background: #eff6ff;
      border-left: 4px solid #2563eb;
      color: #1d4ed8;
      font-weight: 600;
    }

    .message-title {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      opacity: 0.9;
    }

    .message-text {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tour-cell,
    .lang-cell {
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>Sunset Oia Chat Dashboard</h1>

  <div class="top-bar">
    <button class="refresh-btn" onclick="loadLogs()">Refresh</button>
    <button id="fallback-btn" class="refresh-btn" onclick="toggleFallback()">Show Only Fallback</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Timestamp</th>
          <th>Session ID</th>
          <th>Conversation</th>
          <th>Fallback</th>
          <th>Tour</th>
          <th>Language</th>
        </tr>
      </thead>
      <tbody id="logs-body">
        <tr>
          <td colspan="7">Loading logs...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    let showOnlyFallback = false;

    function toggleFallback() {
      showOnlyFallback = !showOnlyFallback;

      const btn = document.getElementById("fallback-btn");
      btn.innerText = showOnlyFallback ? "Show All" : "Show Only Fallback";

      loadLogs();
    }

    async function loadLogs() {
      const tbody = document.getElementById("logs-body");
      tbody.innerHTML = `<tr><td colspan="7">Loading logs...</td></tr>`;

      try {
        const response = await fetch("/admin/logs");
        const data = await response.json();
        const logs = data.logs || [];

        let filteredLogs = logs;

        if (showOnlyFallback) {
          filteredLogs = logs.filter(log => Number(log.fallback) === 1);
        }

        if (!filteredLogs.length) {
          tbody.innerHTML = `<tr><td colspan="7">${showOnlyFallback ? "No fallback logs found." : "No logs found."}</td></tr>`;
          return;
        }

        tbody.innerHTML = filteredLogs.map(log => `
          <tr>
            <td>${log.id ?? ""}</td>
            <td class="timestamp-cell">${escapeHtml(log.timestamp ?? "")}</td>
            <td class="session-cell">${escapeHtml(log.session_id ?? "-")}</td>
            <td class="conversation-cell">
              <div class="conversation-box">
                <div class="message-block user-line">
                  <span class="message-title">Customer</span>
                  <span class="message-text">${escapeHtml(log.user_message ?? "")}</span>
                </div>
                <div class="message-block bot-line">
                  <span class="message-title">Bot</span>
                  <span class="message-text">${escapeHtml(log.bot_reply ?? "")}</span>
                </div>
              </div>
            </td>
            <td class="${Number(log.fallback) === 1 ? 'fallback-yes' : 'fallback-no'}">
              ${Number(log.fallback) === 1 ? 'YES' : 'NO'}
            </td>
            <td class="tour-cell">${escapeHtml(log.detected_tour ?? "-")}</td>
            <td class="lang-cell">${escapeHtml(log.language ?? "-")}</td>
          </tr>
        `).join("");
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="7">Failed to load logs.</td></tr>`;
        console.error(error);
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadLogs();
  </script>
</body>
</html>
